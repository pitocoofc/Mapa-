<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Viewer Pro</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    overflow: hidden;
    font-family: Arial;
}

/* Tela inicial */
#loading {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #00ff9d;
    font-size: 18px;
    z-index: 10;
}

/* Container do mapa */
#container {
    width: 100vw;
    height: 100vh;
    opacity: 0;
    transition: opacity 0.5s ease;
}

svg {
    width: 100%;
    height: 100%;
    transform-origin: 0 0;
    will-change: transform;
    image-rendering: optimizeSpeed;
    shape-rendering: optimizeSpeed;
}
</style>
</head>

<body>

<div id="loading">Carregando mapa...</div>
<div id="container"></div>

<script>
const container = document.getElementById("container");
const loading = document.getElementById("loading");

let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX, startY;

// 🔹 Carregar SVG com verificação
fetch("custom_export.svg")
.then(res => {
    if (!res.ok) throw new Error("Erro ao carregar SVG");
    return res.text();
})
.then(data => {
    container.innerHTML = data;

    const svg = container.querySelector("svg");
    if (!svg) throw new Error("SVG inválido");

    // Mostrar suavemente
    container.style.opacity = "1";
    loading.style.display = "none";

    // Transform inicial
    svg.style.transform = `translate(0px,0px) scale(1)`;

    // Zoom
    container.addEventListener("wheel", (e) => {
        e.preventDefault();
        const zoom = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= zoom;
        updateTransform(svg);
    });

    // Drag
    container.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
    });

    window.addEventListener("mouseup", () => {
        isDragging = false;
    });

    window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        updateTransform(svg);
    });

    function updateTransform(svg) {
        svg.style.transform =
            `translate(${posX}px, ${posY}px) scale(${scale})`;
    }
})
.catch(err => {
    loading.innerText = "Erro ao carregar mapa 😢";
    console.error(err);
});
</script>

</body>
</html>
